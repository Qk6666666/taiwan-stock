<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台股分析站 v3</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b0d12;--bg2:#111318;--bg3:#181b24;--bg4:#1e2130;
  --border:#1e2235;--border2:#272d42;
  --text:#e2e5f0;--text2:#848da8;--text3:#454d68;
  --up:#f04a58;--up-bg:rgba(240,74,88,0.08);--up-border:rgba(240,74,88,0.22);
  --down:#1db870;--down-bg:rgba(29,184,112,0.08);--down-border:rgba(29,184,112,0.22);
  --accent:#5b5ef4;--accent2:#7c7ff7;--gold:#f0a030;
  --green:#22c55e;--amber:#f59e0b;--red:#ef4444;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;min-height:100vh;}

/* Layout */
.layout{display:grid;grid-template-columns:260px 1fr;min-height:100vh;}
.sidebar{background:var(--bg2);border-right:1px solid var(--border);padding:20px 16px;position:sticky;top:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column;gap:6px;}
.main{padding:24px;overflow-x:hidden;}

/* Sidebar */
.sidebar-logo{display:flex;align-items:center;gap:10px;padding:8px 4px 20px;border-bottom:1px solid var(--border);margin-bottom:10px;}
.logo-icon{width:34px;height:34px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;}
.logo-text{font-size:15px;font-weight:700;letter-spacing:.02em;}
.logo-sub{font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace;}

.search-box{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:9px 12px;display:flex;gap:8px;margin-bottom:4px;}
.search-box input{flex:1;background:none;border:none;color:var(--text);font-size:14px;font-family:'Noto Sans TC',sans-serif;outline:none;min-width:0;}
.search-box input::placeholder{color:var(--text3);}
.search-box button{background:var(--accent);color:#fff;border:none;border-radius:7px;padding:5px 12px;font-size:13px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;font-weight:500;white-space:nowrap;}
.search-box button:hover{opacity:.85;}

.sidebar-label{font-size:10px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;padding:10px 4px 6px;margin-top:4px;}
.stock-btn{background:none;border:none;border-radius:9px;padding:9px 10px;cursor:pointer;text-align:left;width:100%;color:var(--text2);font-size:13px;font-family:'Noto Sans TC',sans-serif;display:flex;align-items:center;justify-content:space-between;transition:all .15s;}
.stock-btn:hover{background:var(--bg3);color:var(--text);}
.stock-btn.active{background:rgba(91,94,244,.12);color:var(--accent2);}
.stock-btn-code{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3);}
.stock-btn.active .stock-btn-code{color:var(--accent2);opacity:.7;}

/* Main sections */
.section{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:16px;}
.section-title{font-size:13px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.section-title::before{content:'';width:3px;height:14px;background:var(--accent);border-radius:2px;display:inline-block;}

/* Stock header */
.stock-hero{display:grid;grid-template-columns:1fr auto;gap:20px;align-items:start;}
.hero-name{font-size:26px;font-weight:700;letter-spacing:.01em;margin-bottom:4px;}
.hero-code{font-size:13px;color:var(--text3);font-family:'JetBrains Mono',monospace;}
.hero-price{font-size:44px;font-weight:700;font-family:'JetBrains Mono',monospace;line-height:1;text-align:right;}
.hero-change{font-size:15px;font-family:'JetBrains Mono',monospace;padding:4px 12px;border-radius:8px;display:inline-block;margin-top:8px;}
.up-c{color:var(--up);} .dn-c{color:var(--down);}
.up-tag{background:var(--up-bg);border:1px solid var(--up-border);color:var(--up);}
.dn-tag{background:var(--down-bg);border:1px solid var(--down-border);color:var(--down);}

/* Metrics grid */
.metrics-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:16px;}
.metric-card{background:var(--bg3);border:1px solid var(--border);border-radius:11px;padding:12px 14px;}
.mc-label{font-size:11px;color:var(--text3);margin-bottom:5px;letter-spacing:.04em;}
.mc-value{font-size:18px;font-weight:600;font-family:'JetBrains Mono',monospace;}
.mc-sub{font-size:11px;color:var(--text3);margin-top:3px;font-family:'JetBrains Mono',monospace;}

/* 52W bar */
.range-wrap{margin-top:16px;}
.range-top{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-bottom:6px;}
.range-track{height:5px;background:var(--border2);border-radius:3px;position:relative;}
.range-grad{height:100%;background:linear-gradient(90deg,var(--down),#f0a030,var(--up));border-radius:3px;}
.range-dot{width:12px;height:12px;background:#fff;border:2px solid var(--accent);border-radius:50%;position:absolute;top:50%;transform:translateY(-50%);}

/* K-line */
.kline-controls{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.kline-verdict-row{display:flex;flex-wrap:wrap;gap:6px;}
.period-group{display:flex;gap:5px;}
.pbtn{background:transparent;border:1px solid var(--border2);color:var(--text3);font-size:12px;padding:4px 13px;border-radius:6px;font-family:'JetBrains Mono',monospace;cursor:pointer;transition:all .15s;}
.pbtn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.pbtn:hover:not(.active){border-color:var(--border);color:var(--text2);}
.kline-canvas-wrap{position:relative;width:100%;}
#klineCanvas{width:100%;display:block;border-radius:8px 8px 0 0;}
#volCanvas{width:100%;display:block;border-radius:0 0 8px 8px;}
.kline-vol-divider{height:1px;background:var(--border);margin:0;}
.kline-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--text3);background:var(--bg2);border-radius:10px;}
.kline-hint{font-size:10px;color:var(--text3);text-align:right;margin-top:6px;}

/* Badge */
.badge{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:500;padding:3px 8px;border-radius:5px;white-space:nowrap;}
.b-bull{background:rgba(240,74,88,.12);color:#f87171;border:1px solid rgba(240,74,88,.25);}
.b-bear{background:rgba(29,184,112,.12);color:#4ade80;border:1px solid rgba(29,184,112,.25);}
.b-neu{background:rgba(91,94,244,.1);color:var(--accent2);border:1px solid rgba(91,94,244,.2);}
.b-load{background:var(--bg3);color:var(--text3);border:1px solid var(--border2);}
.b-amber{background:rgba(245,158,11,.1);color:#fbbf24;border:1px solid rgba(245,158,11,.25);}

/* News */
.news-item{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:8px;text-decoration:none;display:block;transition:border-color .15s;}
.news-item:hover{border-color:var(--border2);}
.ni-title{font-size:13px;font-weight:500;color:var(--text);line-height:1.65;margin-bottom:7px;}
.ni-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.ni-src{font-size:10px;color:var(--accent2);background:rgba(91,94,244,.1);padding:2px 7px;border-radius:4px;}
.ni-time{font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace;}
.ni-desc{font-size:12px;color:var(--text2);line-height:1.7;margin-top:7px;}
.news-fallback-links{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
.news-ext-btn{background:var(--bg4);border:1px solid var(--border2);border-radius:8px;padding:8px 14px;color:var(--accent2);font-size:13px;text-decoration:none;}
.news-ext-btn:hover{border-color:var(--accent2);}

/* Related */
.related-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px;}
.related-card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:14px;cursor:pointer;transition:all .15s;}
.related-card:hover{border-color:var(--accent);background:rgba(91,94,244,.04);}
.rc-name{font-size:13px;font-weight:500;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rc-code{font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-bottom:10px;}
.rc-price{font-size:19px;font-weight:700;font-family:'JetBrains Mono',monospace;margin-bottom:3px;}
.rc-change{font-size:11px;font-family:'JetBrains Mono',monospace;padding:2px 7px;border-radius:4px;display:inline-block;}

/* AI Verdict */
.verdict-box{border-radius:14px;padding:20px;margin-bottom:16px;}
.verdict-bull{background:rgba(240,74,88,.06);border:1px solid rgba(240,74,88,.2);}
.verdict-bear{background:rgba(29,184,112,.06);border:1px solid rgba(29,184,112,.2);}
.verdict-neu{background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.2);}
.verdict-header{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.verdict-icon{font-size:32px;}
.verdict-label{font-size:20px;font-weight:700;}
.verdict-sublabel{font-size:13px;color:var(--text2);margin-top:2px;}
.verdict-score-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.score-pill{background:var(--bg3);border:1px solid var(--border2);border-radius:20px;padding:5px 14px;font-size:12px;color:var(--text2);}
.score-pill strong{color:var(--text);}
.verdict-entry{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:14px 16px;margin-bottom:8px;}
.entry-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;}
.entry-value{font-size:22px;font-weight:700;font-family:'JetBrains Mono',monospace;}
.entry-sub{font-size:12px;color:var(--text2);margin-top:4px;line-height:1.6;}
.entry-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.verdict-reason{font-size:13px;color:var(--text2);line-height:1.75;padding:12px 14px;background:var(--bg3);border-radius:10px;border:1px solid var(--border);}
.verdict-disclaimer{font-size:10px;color:var(--text3);margin-top:8px;line-height:1.5;}

/* Loading / error */
.loading-box{text-align:center;padding:4rem 1rem;color:var(--text3);}
.spinner{width:30px;height:30px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px;}
@keyframes spin{to{transform:rotate(360deg);}}
.error-box{background:rgba(240,74,88,.07);border:1px solid rgba(240,74,88,.2);border-radius:12px;padding:16px;color:#f87171;font-size:13px;line-height:1.6;}
.empty-box{text-align:center;padding:3rem;color:var(--text3);font-size:13px;}
.notice{background:rgba(240,160,48,.06);border:1px solid rgba(240,160,48,.18);border-radius:9px;padding:10px 14px;font-size:11px;color:var(--gold);margin-bottom:14px;line-height:1.6;}
.cors-box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;margin-top:10px;}
.cors-box h3{font-size:14px;font-weight:500;margin-bottom:8px;color:var(--gold);}
.cors-box li{font-size:12px;color:var(--text2);line-height:1.8;}
.cors-box ol{padding-left:18px;}
.ext-link{display:inline-block;color:var(--accent2);font-size:12px;text-decoration:none;margin-right:14px;margin-top:6px;}

/* Welcome state */
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;gap:16px;color:var(--text3);}
.welcome-icon{font-size:56px;margin-bottom:8px;}
.welcome h2{font-size:20px;font-weight:500;color:var(--text2);}
.welcome p{font-size:14px;max-width:380px;line-height:1.7;}

/* Tabs inside section */
.inner-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:16px;}
.itab{padding:7px 18px;font-size:13px;cursor:pointer;border:none;background:none;color:var(--text3);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;font-family:'Noto Sans TC',sans-serif;}
.itab.active{color:var(--accent2);border-bottom-color:var(--accent);}
.itab:hover:not(.active){color:var(--text2);}
.ipanel{display:none;}
.ipanel.active{display:block;}

.sidebar-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:10px;}
.stab{flex:1;padding:7px 0;font-size:12px;cursor:pointer;border:none;background:none;color:var(--text3);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;font-family:'Noto Sans TC',sans-serif;text-align:center;}
.stab.active{color:var(--accent2);border-bottom-color:var(--accent);}
.spanel{display:none;flex-direction:column;gap:4px;}
.spanel.active{display:flex;}
.limit-up-row{display:flex;align-items:center;gap:0;padding:7px 8px;border-radius:8px;cursor:pointer;transition:background .12s;}
.limit-up-row:hover{background:var(--bg3);}
.lu-rank{font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace;width:18px;flex-shrink:0;}
.lu-name{font-size:12px;font-weight:500;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lu-code{font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-right:6px;}
.lu-pct{font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--up);background:var(--up-bg);border:1px solid var(--up-border);padding:1px 6px;border-radius:4px;flex-shrink:0;}
.lu-loading{font-size:12px;color:var(--text3);text-align:center;padding:20px 0;}
.sector-tag{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;padding:3px 9px;border-radius:5px;background:rgba(91,94,244,.1);color:var(--accent2);border:1px solid rgba(91,94,244,.2);margin-top:4px;}
.industry-tag{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:2px 7px;border-radius:4px;background:var(--bg3);color:var(--text3);border:1px solid var(--border2);margin-left:6px;}
@media(max-width:780px){
  .layout{grid-template-columns:1fr;}
  .sidebar{position:relative;height:auto;}
  .metrics-grid{grid-template-columns:repeat(2,1fr);}
  .stock-hero{grid-template-columns:1fr;}
  .hero-price{text-align:left;}
}
</style>
</head>

// ─── Fetch helpers ───
async function fetchQuote(id){
  // Step 1: v7 quote API — most accurate for price/change data
  const url=`https://query1.finance.yahoo.com/v7/finance/quote?symbols=${id}.TW&fields=regularMarketPrice,regularMarketChange,regularMarketChangePercent,regularMarketVolume,regularMarketOpen,regularMarketDayHigh,regularMarketDayLow,regularMarketPreviousClose,fiftyTwoWeekHigh,fiftyTwoWeekLow,longName,shortName,trailingPE,marketCap`;
  let q=null;
  for(const u of[url,...CP.map(p=>p(url))]){
    try{const r=await fetch(u,{headers:{Accept:'application/json'}});if(!r.ok)continue;const d=await r.json();const res=d?.quoteResponse?.result?.[0];if(res?.regularMarketPrice){q=res;break;}}catch(e){}
  }

  // Step 2: chart API — 5-day history to get OHLCV + TRUE previous close
  const cu=`https://query1.finance.yahoo.com/v8/finance/chart/${id}.TW?interval=1d&range=5d&includePrePost=false`;
  for(const u of[cu,...CP.map(p=>p(cu))]){
    try{
      const r=await fetch(u);if(!r.ok)continue;
      const d=await r.json();
      const res=d?.chart?.result?.[0];if(!res)continue;
      const m=res.meta||{};
      const qi=res.indicators?.quote?.[0]||{};
      const ts=res.timestamp||[];
      const last=ts.length-1;
      const todayO=qi.open?.[last],todayH=qi.high?.[last],todayL=qi.low?.[last],todayC=qi.close?.[last];

      // TRUE previous close = second-to-last candle's actual close price
      // This is always the real prior trading day close, no dividend adjustment issues
      const truePrevClose = last>=1 && qi.close?.[last-1] ? qi.close[last-1] : null;

      if(q){
        // Fill in missing OHLCV fields from chart
        if(!q.regularMarketOpen&&todayO) q.regularMarketOpen=todayO;
        if(!q.regularMarketDayHigh&&todayH) q.regularMarketDayHigh=todayH;
        if(!q.regularMarketDayLow&&todayL) q.regularMarketDayLow=todayL;
        if(!q.fiftyTwoWeekHigh&&m.fiftyTwoWeekHigh) q.fiftyTwoWeekHigh=m.fiftyTwoWeekHigh;
        if(!q.fiftyTwoWeekLow&&m.fiftyTwoWeekLow) q.fiftyTwoWeekLow=m.fiftyTwoWeekLow;
        // Override previousClose with TRUE value from candle history
        if(truePrevClose){
          q.regularMarketPreviousClose=truePrevClose;
          // Recalculate change/changePercent based on true prev close
          q.regularMarketChange=q.regularMarketPrice-truePrevClose;
          q.regularMarketChangePercent=(q.regularMarketChange/truePrevClose)*100;
        }
      } else {
        // v7 failed — use chart as sole source
        const pv=truePrevClose||m.previousClose||m.chartPreviousClose||0;
        const price=m.regularMarketPrice||todayC;
        if(!price)continue;
        q={
          regularMarketPrice:price,
          regularMarketChange:pv?price-pv:0,
          regularMarketChangePercent:pv?((price-pv)/pv)*100:0,
          regularMarketVolume:m.regularMarketVolume||qi.volume?.[last]||null,
          regularMarketOpen:todayO||null,
          regularMarketDayHigh:todayH||null,
          regularMarketDayLow:todayL||null,
          regularMarketPreviousClose:pv||null,
          fiftyTwoWeekHigh:m.fiftyTwoWeekHigh||null,
          fiftyTwoWeekLow:m.fiftyTwoWeekLow||null,
          longName:m.longName||SN[id]||id,
          shortName:m.shortName||SN[id]||id,
          trailingPE:null,marketCap:null
        };
      }
      break;
    }catch(e){}
  }
  return q;
}

async function fetchKline(id,range,interval){
  const url=`https://query1.finance.yahoo.com/v8/finance/chart/${id}.TW?interval=${interval}&range=${range}&includePrePost=false`;
  for(const u of[url,...CP.map(p=>p(url))]){
    try{const r=await fetch(u);if(!r.ok)continue;const d=await r.json();const res=d?.chart?.result?.[0];if(!res)continue;
    const ts=res.timestamp||[];const q=res.indicators?.quote?.[0]||{};
    const cs=ts.map((t,i)=>({t:new Date(t*1000),o:q.open?.[i],h:q.high?.[i],l:q.low?.[i],c:q.close?.[i],v:q.volume?.[i]})).filter(c=>c.o!=null&&c.h!=null&&c.l!=null&&c.c!=null);
    if(cs.length)return cs;
    }catch(e){}
  }
  return[];
}

async function fetchNews(id,name){
  const kw=encodeURIComponent(name||id);
  // Build "after:" date = 14 days ago for Google News
  const cutoff=new Date();cutoff.setDate(cutoff.getDate()-14);
  const afterStr=`${cutoff.getFullYear()}-${String(cutoff.getMonth()+1).padStart(2,'0')}-${String(cutoff.getDate()).padStart(2,'0')}`;
  const srcs=[
    // ① Google 新聞：近14天，繁中，含股票代號+名稱
    `https://news.google.com/rss/search?q=${id}+${kw}+台股+after:${afterStr}&hl=zh-TW&gl=TW&ceid=TW:zh-Hant`,
    // ② Google 新聞：近14天，只用名稱
    `https://news.google.com/rss/search?q=${kw}+股票+after:${afterStr}&hl=zh-TW&gl=TW&ceid=TW:zh-Hant`,
    // ③ 鉅亨網個股新聞 RSS
    `https://news.cnyes.com/rss/cat/tw_stock_news`,
    // ④ MoneyDJ
    `https://www.moneydj.com/KMDJ/News/NewsRSS.aspx?svc=NW`,
  ];
  const cutoffMs=cutoff.getTime();
  for(const src of srcs){
    for(const u of[src,...CP.map(p=>p(src))]){
      try{
        const r=await fetch(u,{headers:{Accept:'application/rss+xml,text/xml,*/*'}});
        if(!r.ok)continue;const txt=await r.text();if(!txt.includes('<item'))continue;
        const xml=new DOMParser().parseFromString(txt,'text/xml');
        const rawItems=Array.from(xml.querySelectorAll('item'));
        const items=rawItems.map(it=>{
          const gt=tag=>{const m=it.querySelector(tag);if(!m)return'';return(m.textContent||'').replace(/<!\[CDATA\[|\]\]>/g,'').trim();};
          let link=gt('link');if(!link){const ln=it.getElementsByTagName('link')[0];link=ln?.getAttribute('href')||ln?.textContent||'#';}
          const pubDate=gt('pubDate');
          return{title:gt('title'),link,source:gt('source')||'財經新聞',pubDate,desc:gt('description').replace(/<[^>]+>/g,'').slice(0,140),ts:pubDate?new Date(pubDate).getTime():0};
        })
        .filter(it=>it.title&&it.title.length>4)
        // Filter: only keep items from last 30 days, but KEEP items with no date (ts=0)
        .filter(it=>!it.ts||it.ts===0||it.ts>Date.now()-30*86400*1000)
        // Sort newest first
        .sort((a,b)=>b.ts-a.ts)
        .slice(0,6);
        if(items.length>=1)return items;
      }catch(e){}
    }
  }
  return[];
}

// ─── AI via Anthropic API ───
async function callClaude(system,userMsg){
  const body=JSON.stringify({
    model:'claude-haiku-4-5-20251001',
    max_tokens:1000,
    system,
    userMsg,
  });
  const headers={'Content-Type':'application/json'};

  // 優先用 Vercel 後端 API（部署後自動生效，API Key 安全存在伺服器端）
  const isVercel = window.location.hostname !== 'localhost' &&
                   !window.location.protocol.startsWith('file');
  const vercelEndpoint = '/api/claude';

  // 嘗試順序：Vercel API → 直接呼叫（claude.ai 環境）
  const attempts = isVercel
    ? [vercelEndpoint, 'https://api.anthropic.com/v1/messages']
    : ['https://api.anthropic.com/v1/messages'];

  for(const url of attempts){
    try{
      const isVercelApi = url === vercelEndpoint;
      const fetchOptions = isVercelApi
        ? {method:'POST', headers, body}
        : {method:'POST', headers:{...headers}, body:JSON.stringify({
            model:'claude-haiku-4-5-20251001',
            max_tokens:1000,
            system,
            messages:[{role:'user',content:userMsg}]
          })};

      const res = await fetch(url, fetchOptions);
      if(!res.ok) continue;
      const d = await res.json();
      if(d.error) continue;
      const txt = (d.content?.[0]?.text||'').replace(/```json|```/g,'').trim();
      if(txt) return txt;
    }catch(e){}
  }
  throw new Error('API_UNAVAILABLE');
}

// Store candles for tooltip access
let _klineCandles=[], _klinePAD={}, _klineBg=0, _klineInterval='1d';

function drawKline(candles,interval,annotations){
  const canvas=document.getElementById('klineCanvas');
  if(!canvas)return;
  _klineCandles=candles; _klineInterval=interval;
  const wrap=canvas.parentElement;
  const dpr=window.devicePixelRatio||1;
  const W=wrap.clientWidth,H=canvas.offsetHeight||260;
  const KLINE_H=260;
  canvas.style.height=KLINE_H+'px';
  canvas.width=W*dpr;canvas.height=KLINE_H*dpr;
  canvas.style.width=W+'px';
  const ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);
  const PAD={top:18,right:14,bottom:8,left:56};  // reduced bottom — dates shown on vol canvas
  _klinePAD=PAD;
  const cW=W-PAD.left-PAD.right,cH=H-PAD.top-PAD.bottom;
  ctx.fillStyle='#111318';ctx.fillRect(0,0,W,H);

  const n=candles.length;
  if(!n)return;
  const prices=candles.flatMap(c=>[c.h,c.l]);
  const mn=Math.min(...prices),mx=Math.max(...prices);
  const pd=(mx-mn)*0.07;
  const lo=mn-pd,hi=mx+pd;
  const toY=p=>PAD.top+cH-((p-lo)/(hi-lo))*cH;
  const bg=cW/n;_klineBg=bg;
  const bw=Math.max(1.5,bg-1.5);

  // Grid
  for(let i=0;i<=5;i++){
    const p=lo+(hi-lo)*(i/5),y=toY(p);
    ctx.strokeStyle='#1e2235';ctx.lineWidth=.5;
    ctx.beginPath();ctx.moveTo(PAD.left,y);ctx.lineTo(W-PAD.right,y);ctx.stroke();
    ctx.fillStyle='#454d68';ctx.font=`10px 'JetBrains Mono',monospace`;ctx.textAlign='right';
    ctx.fillText(p.toFixed(1),PAD.left-3,y+4);
  }

  // Date labels handled by volume canvas below

  // MA lines
  function cma(arr,p){return arr.map((_,i)=>{if(i<p-1)return null;return arr.slice(i-p+1,i+1).reduce((a,c)=>a+c.c,0)/p;});}
  function dma(mas,col,lw=1){ctx.beginPath();ctx.strokeStyle=col;ctx.lineWidth=lw;let s=false;mas.forEach((v,i)=>{if(v==null)return;const x=PAD.left+i*bg+bg/2,y=toY(v);if(!s){ctx.moveTo(x,y);s=true;}else ctx.lineTo(x,y);});ctx.stroke();}
  dma(cma(candles,5),'rgba(250,200,70,.85)');
  dma(cma(candles,20),'rgba(120,140,255,.85)');
  dma(cma(candles,60),'rgba(250,100,100,.6)');

  // Candles
  candles.forEach((c,i)=>{
    const x=PAD.left+i*bg+bg/2,up=c.c>=c.o,col=up?'#f04a58':'#1db870';
    ctx.strokeStyle=col;ctx.fillStyle=col;ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(x,toY(c.h));ctx.lineTo(x,toY(c.l));ctx.stroke();
    const bt=toY(Math.max(c.o,c.c)),bb=toY(Math.min(c.o,c.c));
    ctx.fillRect(x-bw/2,bt,bw,Math.max(1.5,bb-bt));
  });

  // Legend
  ctx.font=`10px 'JetBrains Mono',monospace`;ctx.textAlign='left';
  ctx.fillStyle='rgba(250,200,70,.9)';ctx.fillText('MA5',PAD.left+4,PAD.top+13);
  ctx.fillStyle='rgba(120,140,255,.9)';ctx.fillText('MA20',PAD.left+34,PAD.top+13);
  ctx.fillStyle='rgba(250,100,100,.7)';ctx.fillText('MA60',PAD.left+68,PAD.top+13);

  // Annotations
  (annotations||[]).forEach(ann=>{
    const idx=Math.round(ann.index);
    if(idx<0||idx>=n)return;
    const c=candles[idx];
    if(!c)return;
    const x=PAD.left+idx*bg+bg/2;
    const bull=ann.type==='bull';
    const col=bull?'#f04a58':'#1db870';
    const bgc=bull?'rgba(240,74,88,.18)':'rgba(29,184,112,.18)';
    const brc=bull?'rgba(240,74,88,.55)':'rgba(29,184,112,.55)';
    const lbl=ann.label||(bull?'看多':'看空');
    ctx.save();ctx.setLineDash([3,4]);ctx.strokeStyle=col;ctx.globalAlpha=.28;ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(x,PAD.top);ctx.lineTo(x,PAD.top+cH);ctx.stroke();ctx.restore();
    const arrowY=bull?toY(c.l)+17:toY(c.h)-17;
    ctx.save();ctx.font='bold 12px sans-serif';ctx.fillStyle=col;ctx.textAlign='center';
    ctx.fillText(bull?'▲':'▼',x,arrowY);ctx.restore();
    ctx.save();
    ctx.font=`bold 10px 'Noto Sans TC',sans-serif`;
    const tw=Math.max(ctx.measureText(lbl).width+14,36);
    const ph=17,pr=4;
    const pillY=bull?toY(c.l)+23:toY(c.h)-27;
    const pillX=Math.min(Math.max(x-tw/2,PAD.left+1),W-PAD.right-tw-1);
    ctx.fillStyle=bgc;ctx.strokeStyle=brc;ctx.lineWidth=1;
    ctx.beginPath();
    ctx.moveTo(pillX+pr,pillY);ctx.lineTo(pillX+tw-pr,pillY);
    ctx.arc(pillX+tw-pr,pillY+pr,pr,-Math.PI/2,0);ctx.lineTo(pillX+tw,pillY+ph-pr);
    ctx.arc(pillX+tw-pr,pillY+ph-pr,pr,0,Math.PI/2);ctx.lineTo(pillX+pr,pillY+ph);
    ctx.arc(pillX+pr,pillY+ph-pr,pr,Math.PI/2,Math.PI);ctx.lineTo(pillX,pillY+pr);
    ctx.arc(pillX+pr,pillY+pr,pr,Math.PI,-Math.PI/2);ctx.closePath();
    ctx.fill();ctx.stroke();
    ctx.fillStyle=col;ctx.textAlign='left';ctx.fillText(lbl,pillX+7,pillY+12);
    ctx.restore();
  });

  // Setup tooltip
  setupKlineTooltip(canvas,candles,PAD,bg,toY,W,H);

  // Draw volume chart below
  drawVolume(candles,PAD,bg);
}

// ─── K-line hover tooltip ───
// Store handler refs so we can remove them before re-attaching
let _tooltipMoveHandler=null, _tooltipLeaveHandler=null;

function setupKlineTooltip(canvas,candles,PAD,bg,toY,W,H){
  // Remove old listeners without cloning (cloneNode destroys drawn pixels)
  if(_tooltipMoveHandler) canvas.removeEventListener('mousemove',_tooltipMoveHandler);
  if(_tooltipLeaveHandler) canvas.removeEventListener('mouseleave',_tooltipLeaveHandler);

  // Get or create tooltip div
  let tip=document.getElementById('klineTooltip');
  if(!tip){
    tip=document.createElement('div');
    tip.id='klineTooltip';
    tip.style.cssText='position:absolute;pointer-events:none;display:none;background:#1a1d2a;border:1px solid #2e3548;border-radius:10px;padding:11px 14px;font-size:12px;font-family:"JetBrains Mono",monospace;color:#e2e5f0;line-height:1.8;z-index:50;min-width:148px;box-shadow:0 6px 24px rgba(0,0,0,.5);';
    canvas.parentElement.style.position='relative';
    canvas.parentElement.appendChild(tip);
  }

  _tooltipMoveHandler = e=>{
    const rect=canvas.getBoundingClientRect();
    const mx=e.clientX-rect.left;
    const idx=Math.floor((mx-PAD.left)/bg);
    if(idx<0||idx>=candles.length){tip.style.display='none';return;}
    const c=candles[idx];if(!c)return;
    const up=c.c>=c.o;
    const chgPct=c.o>0?((c.c-c.o)/c.o*100):0;
    const dateStr=`${c.t.getFullYear()}/${String(c.t.getMonth()+1).padStart(2,'0')}/${String(c.t.getDate()).padStart(2,'0')}`;
    tip.innerHTML=
      `<div style="color:#6b7494;font-size:11px;margin-bottom:6px;letter-spacing:.03em;">${dateStr}</div>`+
      `<div style="color:${up?'#f04a58':'#1db870'};font-weight:700;font-size:14px;margin-bottom:5px;">${up?'▲':'▼'} ${chgPct>=0?'+':''}${chgPct.toFixed(2)}%</div>`+
      `<div style="display:flex;justify-content:space-between;gap:16px;"><span style="color:#555e78;">開</span><span>${c.o.toFixed(2)}</span></div>`+
      `<div style="display:flex;justify-content:space-between;gap:16px;"><span style="color:#555e78;">收</span><strong style="color:${up?'#f04a58':'#1db870'}">${c.c.toFixed(2)}</strong></div>`+
      `<div style="display:flex;justify-content:space-between;gap:16px;"><span style="color:#555e78;">高</span><span style="color:#f04a58">${c.h.toFixed(2)}</span></div>`+
      `<div style="display:flex;justify-content:space-between;gap:16px;"><span style="color:#555e78;">低</span><span style="color:#1db870">${c.l.toFixed(2)}</span></div>`+
      (c.v?`<div style="display:flex;justify-content:space-between;gap:16px;margin-top:3px;border-top:1px solid #1e2235;padding-top:4px;"><span style="color:#555e78;">量</span><span>${(c.v>=1000?(c.v/1000).toFixed(0)+'K':c.v)}</span></div>`:'');
    const tipW=160,tipH=tip.offsetHeight||145;
    const kH=canvas.offsetHeight||260;  // actual kline canvas height
    let tx=mx+16, ty=e.clientY-rect.top-tipH/2;
    if(tx+tipW>W-PAD.right-5) tx=mx-tipW-12;
    if(tx<0) tx=4;
    if(ty<4) ty=4;
    if(ty+tipH>260-4) ty=260-tipH-4;
    tip.style.left=tx+'px';tip.style.top=ty+'px';
    tip.style.display='block';
  };
  _tooltipLeaveHandler = ()=>{tip.style.display='none';};

  canvas.addEventListener('mousemove',_tooltipMoveHandler);
  canvas.addEventListener('mouseleave',_tooltipLeaveHandler);
}

function ruleBasedKlineAnnotations(candles){
  const ann=[],n=candles.length;if(n<5)return[];
  // MA cross detection
  for(let i=Math.max(5,1);i<n;i++){
    if(i<6||i<21)continue;
    const ma5a=candles.slice(i-5,i).reduce((a,c)=>a+c.c,0)/5;
    const ma5b=candles.slice(i-6,i-1).reduce((a,c)=>a+c.c,0)/5;
    const ma20a=candles.slice(i-20,i).reduce((a,c)=>a+c.c,0)/20;
    const ma20b=candles.slice(i-21,i-1).reduce((a,c)=>a+c.c,0)/20;
    if(ma5b<ma20b&&ma5a>=ma20a&&ann.filter(a=>a.label==='黃金交叉').length===0)ann.push({index:i,type:'bull',label:'黃金交叉',reason:'MA5上穿MA20，短線轉多訊號'});
    if(ma5b>ma20b&&ma5a<=ma20a&&ann.filter(a=>a.label==='死亡交叉').length===0)ann.push({index:i,type:'bear',label:'死亡交叉',reason:'MA5下穿MA20，短線轉空訊號'});
  }
  // Breakout vs prior range
  if(n>=15){
    const prior=candles.slice(-15,-5);
    const pH=Math.max(...prior.map(c=>c.h)),pL=Math.min(...prior.map(c=>c.l));
    const last=candles[n-1];
    if(last.c>pH)ann.push({index:n-1,type:'bull',label:'突破壓力',reason:`收盤突破前段高點 ${pH.toFixed(2)}`});
    else if(last.c<pL)ann.push({index:n-1,type:'bear',label:'跌破支撐',reason:`收盤跌破前段低點 ${pL.toFixed(2)}`});
  }
  // Long candles in last 5
  candles.slice(-5).forEach((c,i)=>{
    const body=Math.abs(c.c-c.o),range=c.h-c.l;
    if(range>0&&body/range>0.7&&ann.length<4){
      if(c.c>c.o&&(c.c-c.o)/c.o>0.025)ann.push({index:n-5+i,type:'bull',label:'長紅K',reason:`大陽線 +${((c.c-c.o)/c.o*100).toFixed(1)}%`});
      else if(c.c<c.o&&(c.o-c.c)/c.o>0.025)ann.push({index:n-5+i,type:'bear',label:'長黑K',reason:`大陰線 -${((c.o-c.c)/c.o*100).toFixed(1)}%`});
    }
  });
  return ann.slice(0,4);
}

async function analyzeKline(candles,interval){
  // Always show rule-based annotations immediately
  const ruleAnn=ruleBasedKlineAnnotations(candles);
  drawKline(candles,interval,ruleAnn);
  renderKlineVerdict(ruleAnn);
  // Try AI enhancement silently
  const recent=candles.slice(-20).map((c,i,arr)=>({
    i:candles.length-20+i,
    date:`${c.t.getMonth()+1}/${c.t.getDate()}`,
    o:+c.o.toFixed(2),h:+c.h.toFixed(2),l:+c.l.toFixed(2),c:+c.c.toFixed(2),
    chg:arr[i-1]?+(((c.c-arr[i-1].c)/arr[i-1].c)*100).toFixed(2):0
  }));
  const totalLen=candles.length;
  const prompt=`以下是最近${recent.length}根K線（${interval==='1d'?'日K':interval==='1wk'?'週K':'月K'}），格式[index,日期,開,高,低,收,漲跌%]，index從${totalLen-recent.length}到${totalLen-1}：\n${recent.map(c=>`[${c.i},${c.date},${c.o},${c.h},${c.l},${c.c},${c.chg}%]`).join('\n')}\n\n請識別2~4個最重要技術形態訊號，標示index（必須在${totalLen-recent.length}到${totalLen-1}之間），type為bull或bear，標籤4字以內。只回覆JSON陣列：[{"index":數字,"type":"bull"或"bear","label":"標籤","reason":"說明"}]`;
  try{
    const txt=await callClaude('你是台股技術分析師，只回覆JSON陣列格式，不加說明或markdown。',prompt);
    const parsed=JSON.parse(txt);
    if(!Array.isArray(parsed)||parsed.length===0)return ruleAnn;
    const clamped=parsed.slice(0,5).map(a=>({...a,index:Math.min(Math.max(Math.round(+a.index),0),candles.length-1)}));
    drawKline(candles,interval,clamped);
    renderKlineVerdict(clamped);
    return clamped;
  }catch(e){return ruleAnn;}
}

function renderKlineVerdict(annotations){
  const el=document.getElementById('klineVerdict');
  if(!el)return;
  if(!annotations.length){el.innerHTML='<span class="badge b-neu">無明確訊號</span>';return;}
  const bull=annotations.filter(a=>a.type==='bull').length,bear=annotations.filter(a=>a.type==='bear').length;
  const ov=bull>bear?{cls:'b-bull',icon:'📈',txt:'整體偏多'}:bear>bull?{cls:'b-bear',icon:'📉',txt:'整體偏空'}:{cls:'b-amber',icon:'➡️',txt:'多空均衡'};
  el.innerHTML=`<span class="badge ${ov.cls}">${ov.icon} ${ov.txt}</span>`+annotations.map(a=>`<span class="badge ${a.type==='bull'?'b-bull':'b-bear'}" title="${a.reason||''}">${a.type==='bull'?'▲':'▼'} ${a.label}</span>`).join('');

async function analyzeSentiment(title,idx){
  const el=document.getElementById(`sent_${idx}`);if(!el)return;
  const map={bull:{cls:'b-bull',icon:'📈',lbl:'看好'},bear:{cls:'b-bear',icon:'📉',lbl:'看壞'},neutral:{cls:'b-neu',icon:'➡️',lbl:'中性'}};
  // Instant keyword-based result (no API needed)
  const bullWords=['上漲','大漲','突破','創高','看好','樂觀','買超','法說','季增','年增','獲利','毛利','漲停','新高','強勢','利多','調升'];
  const bearWords=['下跌','大跌','跌破','低點','看壞','悲觀','賣超','虧損','衰退','跌停','新低','弱勢','下修','警示','利空','調降'];
  const bullScore=bullWords.filter(w=>title.includes(w)).length;
  const bearScore=bearWords.filter(w=>title.includes(w)).length;
  const quick=bullScore>bearScore?'bull':bearScore>bullScore?'bear':'neutral';
  const sq=map[quick];
  el.className=`badge ${sq.cls}`;el.textContent=`${sq.icon} ${sq.lbl}`;
  // Try AI for richer analysis silently
  try{
    const txt=await callClaude('你是台股財經新聞情緒分析師。只回覆JSON：{"sentiment":"bull"|"bear"|"neutral","reason":"一句話"}',`分析：「${title}」`);
    const p=JSON.parse(txt);
    const s=map[p.sentiment]||map.neutral;
    const now=document.getElementById(`sent_${idx}`);
    if(now){now.className=`badge ${s.cls}`;now.title=p.reason||'';now.textContent=`${s.icon} ${s.lbl}`;}
  }catch(e){/* keep keyword result */}
}

function ruleBasedVerdict(id,q,candles,news){
  // Rule-based analysis when AI API unavailable
  const price=q.regularMarketPrice;
  const wkHigh=q.fiftyTwoWeekHigh||price*1.2;
  const wkLow=q.fiftyTwoWeekLow||price*0.8;
  const pct52=((price-wkLow)/(wkHigh-wkLow)*100);
  const changeP=q.regularMarketChangePercent||0;
  const pe=q.trailingPE;

  // Trend from last 10 candles
  let trendScore=0,ma5=null,ma20=null;
  if(candles.length>=5){
    const last=candles.slice(-5);
    ma5=last.reduce((a,c)=>a+c.c,0)/5;
    if(candles.length>=20)ma20=candles.slice(-20).reduce((a,c)=>a+c.c,0)/20;
    // Rising candles
    const rising=candles.slice(-5).filter((c,i,a)=>i>0&&c.c>a[i-1].c).length;
    trendScore+=rising-2; // -2 to +2
  }
  if(ma5&&ma20)trendScore+=(ma5>ma20?2:-2);
  if(pct52<30)trendScore-=1; // Near 52W low
  if(pct52>80)trendScore+=1; // Near 52W high
  if(changeP>3)trendScore+=1;
  if(changeP<-3)trendScore-=1;

  const bullFactors=[],bearFactors=[];
  if(ma5&&ma20&&ma5>ma20)bullFactors.push('MA5 在 MA20 之上，短期趨勢偏多');
  else if(ma5&&ma20)bearFactors.push('MA5 在 MA20 之下，短期趨勢偏空');
  if(pct52<30)bearFactors.push(`股價在52週低點附近（低位${pct52.toFixed(0)}%）`);
  else if(pct52>75)bullFactors.push(`股價接近52週高點（高位${pct52.toFixed(0)}%），強勢格局`);
  if(changeP>2)bullFactors.push(`今日上漲 ${changeP.toFixed(2)}%，短線動能強`);
  else if(changeP<-2)bearFactors.push(`今日下跌 ${Math.abs(changeP).toFixed(2)}%，短線壓力`);
  if(pe&&pe<15)bullFactors.push(`本益比 ${pe} 倍，估值偏低具吸引力`);
  else if(pe&&pe>30)bearFactors.push(`本益比 ${pe} 倍，估值偏高需留意`);

  let verdict='wait',confidence=50;
  if(trendScore>=2){verdict='buy';confidence=55+Math.min(trendScore*5,20);}
  else if(trendScore<=-2){verdict='avoid';confidence=55+Math.min(Math.abs(trendScore)*5,20);}

  const support=ma5?Math.min(ma5,price*0.97):price*0.97;
  const entryPrice=parseFloat((Math.min(support,price*0.99)).toFixed(1));
  const stopLoss=parseFloat((entryPrice*0.95).toFixed(1));
  const target=parseFloat((entryPrice*1.10).toFixed(1)); // 長線目標（不受單日限制）
  const rr=((target-entryPrice)/(entryPrice-stopLoss)).toFixed(1);

  return{
    verdict,confidence,
    summary:`基於技術面規則分析。${verdict==='buy'?'技術面偏多，可考慮分批進場。':verdict==='avoid'?'技術面偏空，建議觀望。':'技術面中性，建議等待更明確訊號。'}`,
    entry_price:entryPrice,
    entry_reason:`建議於支撐位 ${entryPrice} 元附近分批進場`,
    stop_loss:stopLoss,target_price:target,
    risk_reward:`1:${rr}`,
    bull_factors:bullFactors.length?bullFactors:['無明確看多因素'],
    bear_factors:bearFactors.length?bearFactors:['無明確看空因素'],
    overall_reason:`現價 ${f2(price)} 元，52週高低點 ${f2(wkHigh)}/${f2(wkLow)}，目前位於 ${pct52.toFixed(0)}% 位置。${ma5?`MA5=${f2(ma5)}${ma20?`，MA20=${f2(ma20)}`:''}。`:''}技術面評分 ${trendScore}（-5到+5），${trendScore>0?'偏多':'偏空或中性'}。建議結合基本面與產業消息綜合判斷。`,
    short_term:{
      period:'1～5個交易日（台股±10%限制）',
      outlook:trendScore>=2?'bullish':trendScore<=-2?'bearish':'neutral',
      target:capTarget(entryPrice, trendScore>=2?5:trendScore<=-2?-5:2),
      key_factor:ma5&&ma20?(ma5>ma20?'MA5上方，短線偏多動能':'MA5下方，短線偏弱'):'短線技術面觀察中',
      strategy:trendScore>=2?`短線偏多，可於 ${entryPrice} 附近試單`:trendScore<=-2?'短線偏弱，等待企穩再進':'量縮整理中，等待放量突破',
    },
    mid_term:{
      period:'1～4週',
      outlook:trendScore>=1?'bullish':trendScore<=-1?'bearish':'neutral',
      target:parseFloat((entryPrice*(1+(trendScore>=1?0.08:-0.05))).toFixed(2)),
      key_factor:pct52>60?'52週強勢位置，中線趨勢向上':pct52<30?'52週低位，中線有反彈空間':'中線位置中性，方向待確認',
      strategy:trendScore>=1?'逢回分批佈局，守住MA20支撐':'觀察均線是否形成多頭排列後再進場',
    },
    long_term:{
      period:'1～3個月',
      outlook:ma5&&ma20&&ma5>ma20?'bullish':'neutral',
      target:parseFloat((price*(1+(verdict==='buy'?0.15:verdict==='avoid'?-0.05:0.07))).toFixed(2)),
      key_factor:'長線需搭配基本面：獲利成長、產業趨勢、法人態度',
      strategy:verdict==='buy'?'基本面確認後可分批建立長線部位，停損設在重要支撐下方':`長線需等待${verdict==='avoid'?'落底訊號確認':'更明確的基本面支撐'}`,
    }
  };
}

// ─── 台股漲跌幅規則 ───
function capTarget(basePrice, pct, isEtf=false, isNew=false){
  // isNew = 新上市首5日無限制; isEtf = ETF ±10%; normal = ±10%
  if(isNew) return parseFloat((basePrice*(1+pct/100)).toFixed(2));
  const limit = isEtf ? 0.10 : 0.10; // 台股一般股票及ETF均為±10%
  const cappedPct = Math.min(Math.max(pct/100, -limit), limit);
  return parseFloat((basePrice*(1+cappedPct)).toFixed(2));
}

let limitUpLoaded=false;
async function loadLimitUp(){
  if(limitUpLoaded)return;
  const el=document.getElementById('limitUpList');
  if(!el)return;
  el.innerHTML='<div class="lu-loading"><div class="spinner" style="width:20px;height:20px;margin:0 auto 8px;"></div>載入台股漲停榜…</div>';
  let stocks=[];

  // ① 優先：台灣證交所官方 API — 當日成交明細（不需要 CORS 套件，公開資料）
  const today=new Date();
  const yyyyMMdd=today.getFullYear().toString()+(today.getMonth()+1).toString().padStart(2,'0')+today.getDate().toString().padStart(2,'0');
  const twseApis=[
    `https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_ALL`,
    `https://openapi.twse.com.tw/v1/exchangeReport/MI_INDEX`,
  ];

  // TWSE STOCK_DAY_ALL — 全上市股票當日成交資料
  for(const base of twseApis.slice(0,1)){
    for(const u of[base,...CP.map(p=>p(base))]){
      try{
        const r=await fetch(u,{headers:{Accept:'application/json'}});
        if(!r.ok)continue;
        const d=await r.json();
        if(!Array.isArray(d)||!d.length)continue;
        // STOCK_DAY_ALL fields: Code, Name, TradeVolume, TradeValue, OpeningPrice, HighestPrice, LowestPrice, ClosingPrice, Change, Transaction
        const parsed=d.map(s=>{
          const close=parseFloat((s.ClosingPrice||s.收盤價||'0').replace(',',''));
          const prev=parseFloat((s.OpeningPrice||s.開盤價||close).replace(',',''));
          const change=parseFloat((s.Change||s.漲跌價差||'0').replace(',','').replace('+',''));
          const pct=prev>0?(change/prev*100):0;
          return{
            symbol:s.Code||s.證券代號||'',
            name:s.Name||s.證券名稱||'',
            price:close,
            change,pct,
            volume:parseFloat((s.TradeVolume||'0').replace(',',''))
          };
        }).filter(s=>s.symbol&&s.symbol.length>=4&&!/[A-Za-z]/.test(s.symbol)&&s.pct>=9.5);
        if(parsed.length){
          stocks=parsed.sort((a,b)=>b.pct-a.pct).slice(0,30);
          break;
        }
      }catch(e){}
    }
    if(stocks.length)break;
  }

  // ② 備援：TWSE 上市個股行情（另一端點）
  if(!stocks.length){
    const url2=`https://openapi.twse.com.tw/v1/exchangeReport/MI_INDEX20`;
    for(const u of[url2,...CP.map(p=>p(url2))]){
      try{
        const r=await fetch(u);if(!r.ok)continue;
        const d=await r.json();
        if(Array.isArray(d)&&d.length){
          const parsed=d.map(s=>({
            symbol:s.證券代號||'',
            name:s.證券名稱||'',
            price:parseFloat((s.收盤價||'0').replace(',','')),
            pct:parseFloat((s.漲跌幅||'0').replace(',',''))
          })).filter(s=>s.symbol&&s.pct>=9.5);
          if(parsed.length){stocks=parsed.sort((a,b)=>b.pct-a.pct).slice(0,30);break;}
        }
      }catch(e){}
    }
  }

  // ③ 最後備援：Yahoo Finance screener 但強制只留 .TW 股票
  if(!stocks.length){
    const yUrl='https://query1.finance.yahoo.com/v1/finance/screener/predefined/saved?formatted=false&lang=zh-TW&region=TW&scrIds=day_gainers&count=50&start=0';
    for(const u of[yUrl,...CP.map(p=>p(yUrl))]){
      try{
        const r=await fetch(u,{headers:{Accept:'application/json'}});if(!r.ok)continue;
        const d=await r.json();
        const quotes=(d?.finance?.result?.[0]?.quotes||[])
          .filter(q=>(q.symbol||'').endsWith('.TW')||(q.symbol||'').endsWith('.TWO'))
          .filter(q=>(q.regularMarketChangePercent||0)>=9.5)
          .map(q=>({
            symbol:(q.symbol||'').replace('.TWO','').replace('.TW',''),
            name:q.longName||q.shortName||q.symbol||'',
            price:q.regularMarketPrice||0,
            pct:q.regularMarketChangePercent||0
          }));
        if(quotes.length){stocks=quotes.sort((a,b)=>b.pct-a.pct).slice(0,30);break;}
      }catch(e){}
    }
  }

  if(!stocks.length){
    el.innerHTML=`<div class="lu-loading" style="font-size:11px;color:var(--text3);padding:12px 4px;">📭 今日無漲停資料<br>（交易時間為週一至五 09:00-13:30）<br><br><span style="cursor:pointer;color:var(--accent2);" onclick="limitUpLoaded=false;loadLimitUp()">🔄 重試</span></div>`;
    return;

    const sector=SECTOR_DB[s.symbol];
    return`<div class="limit-up-row" onclick="quickSearch('${s.symbol}')">
      <span class="lu-rank">${i+1}</span>

let nextDayCache={};
async function runNextDayPrediction(id,q,candles,news){
  const el=document.getElementById('nextdayArea');if(!el)return;
  if(nextDayCache[id]){el.innerHTML=nextDayCache[id];return;}
  el.innerHTML='<div class="loading-box"><div class="spinner"></div>AI 分析中，整合技術面、籌碼面、消息面…</div>';

  const price=q.regularMarketPrice;
  const name=q.longName||q.shortName||SN[id]||id;

  // ── 技術面分析 ──
  let techSummary='無K線資料';
  let ma5v=null,ma10v=null,ma20v=null,rsiV=null,volRatio=null;
  if(candles.length>=5){
    const n=candles.length;
    ma5v=candles.slice(-5).reduce((a,c)=>a+c.c,0)/5;
    if(n>=10)ma10v=candles.slice(-10).reduce((a,c)=>a+c.c,0)/10;
    if(n>=20)ma20v=candles.slice(-20).reduce((a,c)=>a+c.c,0)/20;
    // RSI-14
    if(n>=15){
      const gains=[],losses=[];
      for(let i=n-14;i<n;i++){const d=candles[i].c-candles[i-1].c;if(d>0)gains.push(d);else losses.push(-d);}
      const ag=gains.reduce((a,b)=>a+b,0)/14,al=losses.reduce((a,b)=>a+b,0)/14;
      rsiV=al===0?100:100-(100/(1+ag/al));
    }
    // Volume ratio (last 3 vs 20-day avg)
    if(n>=20){
      const avgV=candles.slice(-20,-3).reduce((a,c)=>a+(c.v||0),0)/17;
      const recV=candles.slice(-3).reduce((a,c)=>a+(c.v||0),0)/3;
      if(avgV>0)volRatio=recV/avgV;
    }
    // Last 5 candles
    const last5=candles.slice(-5);
    const risingDays=last5.filter((c,i)=>i>0&&c.c>last5[i-1].c).length;
    const last=candles[n-1];
    const bodyPct=last?(Math.abs(last.c-last.o)/(last.h-last.l||1)*100):0;
    techSummary=`近5日上漲${risingDays}天。` +

function ruleBasedNextDay(q,candles){
  const price=q.regularMarketPrice;
  const n=candles.length;
  let scenario='neutral',confidence=55;
  const ma5=n>=5?candles.slice(-5).reduce((a,c)=>a+c.c,0)/5:price;
  const ma20=n>=20?candles.slice(-20).reduce((a,c)=>a+c.c,0)/20:price;
  const chg=q.regularMarketChangePercent||0;
  if(ma5>ma20&&chg>0){scenario='bullish';confidence=60;}
  else if(ma5<ma20&&chg<0){scenario='bearish';confidence=60;}
  const support=Math.min(ma5,price*0.97);
  const resist=Math.max(ma5*1.03,price*1.03);
  return{
    scenario,confidence,
    predicted_open:chg>1?'高開':chg<-1?'低開':'平開',
    predicted_range:`現價±2～3%區間整理`,
    price_target_high:parseFloat((price*1.03).toFixed(2)),
    price_target_low:parseFloat((price*0.97).toFixed(2)),
    key_levels:[`支撐：${support.toFixed(2)} 元（MA5附近）`,`壓力：${resist.toFixed(2)} 元（前高區）`],
    main_drivers:[
      ma5>ma20?'短線均線多頭排列':'短線均線空頭排列',
      `今日${chg>=0?'收紅':'收黑'}，${Math.abs(chg).toFixed(2)}%`,
      '成交量顯示市場觀望'
    ],
    risk_factors:['外資動向不明','盤面消息隨時影響走勢'],
    strategy:scenario==='bullish'?`可於 ${support.toFixed(1)} 附近找買點，守住支撐`:scenario==='bearish'?`建議觀望，跌破 ${support.toFixed(1)} 不宜追空`:`震盪格局，等待方向明確後再操作`,
    disclaimer:'此為規則型預測（AI離線），實際走勢受多重因素影響，請謹慎參考'
  };
}

function drawVolume(candles,kPAD,bg){
  const vc=document.getElementById('volCanvas');
  if(!vc)return;
  const wrap=vc.parentElement;
  const dpr=window.devicePixelRatio||1;
  const W=wrap.clientWidth;
  const H=parseInt(vc.style.height)||vc.offsetHeight||70;
  const VOL_H=70;
  vc.style.height=VOL_H+'px';
  vc.width=W*dpr; vc.height=VOL_H*dpr;
  vc.style.width=W+'px';
  const ctx=vc.getContext('2d'); ctx.scale(dpr,dpr);

  ctx.fillStyle='#111318'; ctx.fillRect(0,0,W,H);

  const PAD={top:6,right:kPAD.right,bottom:18,left:kPAD.left};
  const cW=W-PAD.left-PAD.right;
  const cH=VOL_H-PAD.top-PAD.bottom;
  const n=candles.length;
  if(!n)return;

  const vols=candles.map(c=>c.v||0);
  const maxV=Math.max(...vols)||1;
  const barW=Math.max(1.5,bg-1.5);
  // MA5 volume
  const vma5=vols.map((_,i)=>{if(i<4)return null;return vols.slice(i-4,i+1).reduce((a,b)=>a+b,0)/5;});

  // Volume bars
  candles.forEach((c,i)=>{
    const v=c.v||0;
    const x=PAD.left+i*bg+bg/2;
    const barH=Math.max(1,(v/maxV)*cH);
    const y=PAD.top+cH-barH;
    const up=c.c>=c.o;
    ctx.fillStyle=up?'rgba(240,74,88,.55)':'rgba(29,184,112,.55)';
    ctx.fillRect(x-barW/2,y,barW,barH);
  });

  // Volume MA5 line
  ctx.beginPath(); ctx.strokeStyle='rgba(250,200,70,.7)'; ctx.lineWidth=1;
  let started=false;
  vma5.forEach((v,i)=>{
    if(v==null)return;
    const x=PAD.left+i*bg+bg/2;
    const y=PAD.top+cH-(v/maxV)*cH;
    if(!started){ctx.moveTo(x,y);started=true;}else ctx.lineTo(x,y);
  });
  ctx.stroke();

  // Volume scale label (max)
  const fmtVol=v=>v>=1e8?`${(v/1e8).toFixed(1)}億`:v>=1e4?`${(v/1000).toFixed(0)}K`:String(v);
  ctx.fillStyle='#454d68'; ctx.font=`9px 'JetBrains Mono',monospace`; ctx.textAlign='right';
  ctx.fillText(fmtVol(maxV), PAD.left-3, PAD.top+10);
  ctx.fillText('量', PAD.left-3, PAD.top+cH);

  // Date ticks along bottom — sync with kline, interval-aware
  const _interval=_klineInterval||'1d';
  const minSpacing=_interval==='1mo'?50:34; let lastX=-999;
  candles.forEach((c,i)=>{
    const x=PAD.left+i*bg+bg/2;
    if(x-lastX<minSpacing)return;
    const lbl=_interval==='1mo'?`${c.t.getFullYear()}/${c.t.getMonth()+1}`:_interval==='1wk'?`${c.t.getMonth()+1}/${c.t.getDate()}`:`${c.t.getMonth()+1}/${c.t.getDate()}`;
    ctx.fillStyle='#454d68'; ctx.textAlign='center'; ctx.font=`9px 'JetBrains Mono',monospace`;
    ctx.fillText(lbl, x, H-3);
    lastX=x;
  });
}

let winrateLoaded=false;
async function loadWinRate(){
  if(winrateLoaded)return;
  const el=document.getElementById('winrateList');if(!el)return;
  el.innerHTML='<div class="lu-loading"><div class="spinner" style="width:20px;height:20px;margin:0 auto 8px;"></div>AI 分析勝率中（約30秒）…</div>';

  // Fetch quotes + klines in parallel
  const results=await Promise.allSettled(WINRATE_POOL.map(async item=>{
    const [q,cs]=await Promise.all([
      fetchQuote(item.id).catch(()=>null),
      fetchKline(item.id,'1mo','1d').catch(()=>[])
    ]);
    return{...item,q,cs};
  }));

  // Score each stock using the same rule-based engine as ruleBasedVerdict
  const scored=results
    .filter(r=>r.status==='fulfilled'&&r.value.q?.regularMarketPrice)
    .map(r=>{
      const{id,name,q,cs}=r.value;
      const price=q.regularMarketPrice;
      const wkHigh=q.fiftyTwoWeekHigh||price*1.2;
      const wkLow=q.fiftyTwoWeekLow||price*0.8;
      const pct52=((price-wkLow)/(wkHigh-wkLow)*100);
      const chgPct=q.regularMarketChangePercent||0;
      const pe=q.trailingPE?+q.trailingPE:null;

      // Technical scoring
      let techScore=0, ma5=null, ma20=null;
      if(cs.length>=5){
        ma5=cs.slice(-5).reduce((a,c)=>a+c.c,0)/5;
        if(cs.length>=20) ma20=cs.slice(-20).reduce((a,c)=>a+c.c,0)/20;
        const rising5=cs.slice(-5).filter((c,i,a)=>i>0&&c.c>a[i-1].c).length;
        techScore+=rising5; // 0-4
        if(ma5&&ma20) techScore+=(ma5>ma20?3:-3);
        // Volume surge
        if(cs.length>=20){
          const avgV=cs.slice(-20,-3).reduce((a,c)=>a+(c.v||0),0)/17;
          const recV=cs.slice(-3).reduce((a,c)=>a+(c.v||0),0)/3;
          if(avgV>0&&recV/avgV>1.5) techScore+=2;
        }
        // Trend: recent 10-day performance
        if(cs.length>=10){
          const r10=((cs[cs.length-1].c-cs[cs.length-10].c)/cs[cs.length-10].c*100);
          techScore+=Math.min(r10/2,4);
        }
        // Price above MA20
        if(ma20&&price>ma20) techScore+=1;
      }
      // Valuation score
      let valScore=0;
      if(pct52<30) valScore+=2; // low price = potential upside
      if(pct52>60&&pct52<90) valScore+=3; // strong but not overbought
      if(pe&&pe<15) valScore+=2;
      if(pe&&pe>40) valScore-=2;
      if(chgPct>1) valScore+=1;

      const totalScore=techScore+valScore;
      // Winrate: 50% base + score contribution, capped 45-82%
      const winrate=Math.min(82,Math.max(45,50+totalScore*2.5));
      let verdict='wait';
      if(totalScore>=5) verdict='buy';
      else if(totalScore<=-3) verdict='avoid';

      return{id,name,price,pct52,chgPct,pe,ma5,ma20,techScore,valScore,totalScore,winrate,verdict};
    })
    .sort((a,b)=>b.winrate-a.winrate)
    .slice(0,15);

  if(!scored.length){
    el.innerHTML='<div class="lu-loading" style="font-size:11px;color:var(--text3);">載入失敗</div>';
    return;
  }
  winrateLoaded=true;
  const vmap={buy:{icon:'🟢',col:'var(--up)'},wait:{icon:'🟡',col:'var(--gold)'},avoid:{icon:'🔴',col:'var(--down)'}};
  const rows=scored.map((s,i)=>{
    const vm=vmap[s.verdict]||vmap.wait;
    const barW=Math.round(s.winrate);
    const barCol=s.winrate>=68?'var(--up)':s.winrate>=58?'var(--gold)':'var(--text3)';
    const up=s.chgPct>=0;
    const sector=SECTOR_DB[s.id];
    return`<div class="limit-up-row" onclick="quickSearch('${s.id}')">
      <span class="lu-rank" style="font-weight:700;color:${i<3?'var(--gold)':'var(--text3)'};">${i+1}</span>
      <div style="flex:1;min-width:0;margin:0 5px;">
        <div style="display:flex;align-items:center;justify-content:space-between;">
          <span class="lu-name">${s.name}</span>
          <span style="font-size:13px;font-weight:700;font-family:'JetBrains Mono',monospace;color:${up?'var(--up)':'var(--down)'};">${f2(s.price)}</span>
        </div>
        <div style="display:flex;align-items:center;gap:5px;margin-top:2px;">
          <span class="lu-code">${s.id}</span>
          ${sector?`<span style="font-size:9px;color:var(--text3);">${sector[1]}</span>`:''}
          <span style="font-size:10px;color:${up?'var(--up)':'var(--down)'};">${up?'+':''}${s.chgPct.toFixed(2)}%</span>
        </div>
        <div style="display:flex;align-items:center;gap:6px;margin-top:4px;">
          <div style="flex:1;height:5px;background:var(--border2);border-radius:3px;overflow:hidden;">
            <div style="width:${barW}%;height:100%;background:${barCol};border-radius:3px;transition:width .4s;"></div>
          </div>
          <span style="font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;color:${barCol};white-space:nowrap;">${s.winrate.toFixed(0)}%</span>
          <span style="font-size:11px;">${vm.icon}</span>
        </div>
      </div>
    </div>`;
  }).join('');

  const now=new Date().toLocaleString('zh-TW',{hour12:false,hour:'2-digit',minute:'2-digit'});
  el.outerHTML=`<div id="winrateList">
    <div style="font-size:10px;color:var(--text3);padding:2px 4px 6px;display:flex;justify-content:space-between;">
      <span>🏆 AI勝率排行（前15）</span>
      <span style="cursor:pointer;color:var(--accent2);" onclick="winrateLoaded=false;loadWinRate()">↺</span>
    </div>
    <div style="font-size:9px;color:var(--text3);padding:0 4px 8px;line-height:1.5;">依技術面+估值綜合評分排序<br>勝率 = 進場後上漲機率估計</div>
    ${rows}
    <div style="font-size:10px;color:var(--text3);text-align:center;padding:8px 0 2px;">更新 ${now}　⚠️ 僅供參考</div>
  </div>`;
}

// ─── Error / misc ───
function showError(id){
  const qs=document.getElementById('quoteSection');
  if(qs)qs.innerHTML=`<div class="error-box">❌ 無法取得 <strong>${id}</strong> 的資料。請確認代號正確，並確保 Allow CORS 擴充套件已啟用。</div>`;
  const cb=document.getElementById('corsBox');
  if(cb){cb.style.display='block';document.getElementById('corsLinks').innerHTML=`<a class="ext-link" href="https://tw.stock.yahoo.com/quote/${id}.TW" target="_blank">→ Yahoo 股市</a><a class="ext-link" href="https://www.cnyes.com/twstock/${id}" target="_blank">→ 鉅亨網</a>`;}
}
</script>
